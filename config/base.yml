# Shared RuboCop configuration for all LegionIO gems.
# Do not use directly — inherit via config/lex.yml or config/core.yml.

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false

Layout/LineLength:
  Max: 160

Layout/SpaceAroundEqualsInParameterDefault:
  EnforcedStyle: space

Layout/HashAlignment:
  EnforcedHashRocketStyle: table
  EnforcedColonStyle: table

Metrics/MethodLength:
  Max: 50

Metrics/ClassLength:
  Max: 1500

Metrics/ModuleLength:
  Max: 1500

Metrics/BlockLength:
  Max: 40
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/AbcSize:
  Max: 60

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 17

Style/Documentation:
  Enabled: false

Style/SymbolArray:
  Enabled: true

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Naming/FileName:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

# --- Performance ---
# All Performance cops enabled by default (rubocop-performance).
# Override per-repo only if needed.

Performance:
  Enabled: true

# --- Thread Safety ---
# LegionIO is a concurrent async engine. These cops catch real bugs.

ThreadSafety:
  Enabled: true

ThreadSafety/NewThread:
  Enabled: true
  Exclude:
    - 'lib/**/service.rb'
    - 'lib/**/service/**/*.rb'
    - 'lib/**/connection.rb'
    - 'lib/**/connection/**/*.rb'
    - 'spec/**/*'

ThreadSafety/ClassInstanceVariable:
  Enabled: true
  Exclude:
    - 'lib/**/singleton/**/*.rb'
    - 'spec/**/*'

ThreadSafety/RackMiddlewareInstanceVariable:
  Enabled: false

ThreadSafety/DirChdir:
  Enabled: true
  AllowCallWithBlock: true
